<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card Flip</title>
    <style>
        
body {
    font-family: Arial, sans-serif;
    background-color: #f3f4f6;
    display: flex;
    justify-content: center;
    align-items: center;
}

#card-container {
    perspective: 1000px;
}

.card {
    width: 280px;
    height: 360px;
}

.card-inner {
    width: 100%;
    height: 100%;
    position: relative;
    transition: transform 0.7s;
    transform-style: preserve-3d;
}

.card-inner.flipped {
    transform: rotateY(180deg);
}

.card-front,
.card-back {
    width: 100%;
    height: 100%;
    position: absolute;
    top: 0;
    left: 0;
    backface-visibility: hidden;
    border-radius: 16px;
    background: white;
    box-sizing: border-box;
    padding: 20px;
    text-align: center;
}

.card-front img {
    width: 110px;
    height: 110px;
    border-radius: 20px;
    object-fit: cover;
    margin-top: 20px;
}

.card-front h2,
.card-back h2 {
    margin: 16px 0 10px;
}

.card-front p,
.card-back p {
    color: #555;
    margin: 8px 0;
}

.card-back {
    transform: rotateY(180deg); 
}

.card-back {
    color: rgb(0, 0, 0);
}

button {
    background-color: #2563eb;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 18px;
}

button:hover {
    background-color: #1d4ed8;
}

    </style>
</head>
<body>
    <div id="card-container"></div>

    <script>
        const container = document.getElementById("card-container");

        const card = document.createElement("div");
        card.className = "card";

        const cardInner = document.createElement("div");
        cardInner.className = "card-inner";

        const cardFront = document.createElement("div");
        cardFront.className = "card-front";

        const image = document.createElement("img");
        image.src = "avatar.png";
        image.alt = "Profile Picture";

        const name = document.createElement("h2");
        name.textContent = "Will Smith";
        const job = document.createElement("p");
        job.textContent = "Web Developer";

        const flipBtn = document.createElement("button");
        flipBtn.textContent = "View Details";
        flipBtn.onclick = function() {
            cardInner.classList.toggle("flipped");
        };

        cardFront.appendChild(image);
        cardFront.appendChild(name);
        cardFront.appendChild(job);
        cardFront.appendChild(flipBtn);

        const cardBack = document.createElement("div");
        cardBack.className = "card-back";

        const detailsTitle = document.createElement("h2");
        detailsTitle.textContent = "Profile Details";

        const email = document.createElement("p");
        email.textContent = "Email: willsmith@gmail.com";
        
        const phone = document.createElement("p");
        phone.textContent = "Phone: (602) 352-3422";

        const city = document.createElement("p");
        city.textContent = "City: Phoenix, Arizona";

        const hobby = document.createElement("p");
        hobby.textContent = "Hobby: Photography";

        const backBtn = document.createElement("button");
        backBtn.textcontent = "Go back";
        backBtn.onclick = function() {
            cardInner.classList.toggle("flipped");
        }

        cardBack.appendChild(detailsTitle);
        cardBack.appendChild(email);
        cardBack.appendChild(phone);
        cardBack.appendChild(city);
        cardBack.appendChild(hobby);
        cardBack.appendChild(backBtn);


        cardInner.appendChild(cardFront);
        cardInner.appendChild(cardBack);
        card.appendChild(cardInner);
        container.appendChild(card);
    </script>
</body>
</html>
